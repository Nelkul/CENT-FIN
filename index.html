<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100 FIN. - Perspective Fixe</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        
        /* Interface */
        #ui { position: absolute; top: 20px; left: 20px; color: #ffeb3b; pointer-events: none; z-index: 10; }
        #hint-bubble { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; border: 1px solid #ffeb3b; display: none; }

        /* Contrôles Mobiles */
        #mobile-controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .joystick { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; position: relative; }
        .knob { width: 40px; height: 40px; background: #fff; border-radius: 50%; position: absolute; top: 30px; left: 30px; }
        .action-btn { width: 80px; height: 80px; background: rgba(255, 235, 59, 0.4); border: 2px solid #ffeb3b; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Écran de Fin */
        #ending-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 450px; background: rgba(0,0,0,0.95); border: 4px solid #ffeb3b; color: white; padding: 30px; text-align: center; z-index: 100; }
        .btn { background: #ffeb3b; border: none; padding: 12px 25px; cursor: pointer; font-family: inherit; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 id="progress">Fins : 0/100</h2>
        <div id="objective">Objectif : Fin #1</div>
    </div>

    <div id="hint-bubble">Appuie sur [ACTION] pour interagir</div>

    <div id="mobile-controls">
        <div class="joystick" id="joy"><div class="knob" id="knob"></div></div>
        <div class="action-btn" id="act-btn">ACTION</div>
    </div>

    <div id="ending-screen">
        <h1 id="end-title">FIN #1</h1>
        <p id="end-desc"></p>
        <button class="btn" onclick="nextFin()">CONTINUER L'HISTOIRE</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCÈNE & CAMÉRA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // Caméra fixe en angle (Perspective isométrique-ish)
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(7, 7, 7); // Coin haut-droite
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LUMIÈRES ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 10, 5);
        sun.castShadow = true;
        scene.add(sun);

        // --- LA PIÈCE ---
        // Sol
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Murs (seulement deux murs pour ne pas bloquer la vue)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const wall1 = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 0.2), wallMat);
        wall1.position.set(0, 2, -5);
        scene.add(wall1);
        const wall2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 10), wallMat);
        wall2.position.set(-5, 2, 0);
        scene.add(wall2);

        // --- OBJETS ---
        const interactables = [];
        function addObj(w, h, d, x, z, color, name) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color }));
            mesh.position.set(x, h/2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { name: name };
            scene.add(mesh);
            interactables.push(mesh);
            return mesh;
        }

        const tv = addObj(0.2, 1, 1.5, -4.8, 0, 0x000, "télé");
        const bed = addObj(2, 0.5, 3, 3.5, -3, 0x444466, "lit");
        const sofa = addObj(2.5, 0.6, 1, 0, 4, 0x660000, "canapé");
        const fridge = addObj(0.8, 1.8, 0.8, -4, 4, 0xeeeeee, "frigo");

        // --- PERSONNAGE ---
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.5), new THREE.MeshStandardMaterial({ color: 0x4CAF50 }));
        body.position.y = 0.5;
        playerGroup.add(body);
        
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
        head.position.y = 1;
        playerGroup.add(head);

        playerGroup.position.set(0, 0, 0);
        playerGroup.castShadow = true;
        scene.add(playerGroup);

        // --- LOGIQUE DE JEU ---
        let unlockedCount = 0;
        let isPaused = false;
        const keys = {};
        const moveDir = new THREE.Vector3();

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        const finMessages = [
            { id: 1, target: "télé", title: "Hypnose", desc: "La télé est éteinte, mais tu vois ton avenir dans le reflet noir. C'est vide." },
            { id: 2, target: "canapé", title: "Léthargie", desc: "Tu t'assois si fort que tu deviens un coussin. Quelqu'un s'assoira sur toi dans 10 ans." },
            { id: 3, target: "frigo", title: "Faim Sans Fin", desc: "Tu cherches quelque chose qui n'existe plus. Le frigo est ton seul ami maintenant." }
        ];

        function checkInteractions() {
            let nearby = null;
            interactables.forEach(obj => {
                const dist = playerGroup.position.distanceTo(obj.position);
                if(dist < 1.5) nearby = obj;
            });

            if(nearby) {
                document.getElementById('hint-bubble').style.display = 'block';
                if(keys['Space'] || touchAction) {
                    const goal = finMessages[unlockedCount];
                    if(goal && nearby.userData.name === goal.target) {
                        triggerEnd(goal);
                    }
                }
            } else {
                document.getElementById('hint-bubble').style.display = 'none';
            }
        }

        function triggerEnd(fin) {
            isPaused = true;
            document.getElementById('end-title').innerText = `FIN #${fin.id} : ${fin.title}`;
            document.getElementById('end-desc').innerText = fin.desc;
            document.getElementById('ending-screen').style.display = 'block';
        }

        window.nextFin = () => {
            unlockedCount++;
            document.getElementById('progress').innerText = `Fins : ${unlockedCount}/100`;
            document.getElementById('objective').innerText = `Objectif : Fin #${unlockedCount + 1}`;
            document.getElementById('ending-screen').style.display = 'none';
            isPaused = false;
        };

        // --- TOUCH / MOBILE ---
        let touchAction = false;
        if ('ontouchstart' in window) {
            document.getElementById('mobile-controls').style.display = 'flex';
            document.getElementById('act-btn').addEventListener('touchstart', () => touchAction = true);
            document.getElementById('act-btn').addEventListener('touchend', () => touchAction = false);
        }

        // --- BOUCLE D'ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            
            if(!isPaused) {
                moveDir.set(0, 0, 0);
                if(keys['KeyW'] || keys['ArrowUp']) moveDir.z -= 1;
                if(keys['KeyS'] || keys['ArrowDown']) moveDir.z += 1;
                if(keys['KeyA'] || keys['ArrowLeft']) moveDir.x -= 1;
                if(keys['KeyD'] || keys['ArrowRight']) moveDir.x += 1;

                if(moveDir.length() > 0) {
                    moveDir.normalize().multiplyScalar(0.08);
                    playerGroup.position.add(moveDir);
                    // Rotation du perso vers la direction
                    const targetAngle = Math.atan2(moveDir.x, moveDir.z);
                    playerGroup.rotation.y = targetAngle;
                }

                checkInteractions();
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
