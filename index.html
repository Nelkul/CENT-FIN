<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100 FIN.</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #222; color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none; /* Empêche le zoom accidentel sur mobile */
        }

        /* --- RESPONSIVE CONTAINER --- */
        #main-wrapper {
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh;
        }

        /* --- MENU --- */
        #menu {
            display: flex; width: 90%; max-width: 800px; height: 80%;
            background-color: #333; box-shadow: 0 0 20px black;
        }
        #menu-left {
            width: 45%; border: 5px solid black; background-color: #1a1a1a;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px;
            text-align: center;
        }
        #menu-left h1 { font-size: clamp(14px, 4vw, 20px); }
        #menu-left h1 span { font-size: clamp(24px, 8vw, 40px); color: #ffeb3b; display: block; }
        
        .btn {
            background-color: #444; color: white; border: 2px solid white;
            padding: 10px 20px; margin: 5px; cursor: pointer; font-family: inherit; font-size: 16px;
            width: 90%;
        }

        #menu-right { width: 55%; background-color: #2a2a2a; position: relative; overflow: hidden; }

        /* --- JEU --- */
        #game-container { display: none; position: relative; width: 100%; height: 100%; }
        canvas {
            background-color: #8B5A2B;
            width: 100%; height: 100%; object-fit: contain; /* S'adapte à l'écran sans déformer */
            image-rendering: pixelated;
        }

        /* --- BOUTONS MOBILES --- */
        .mobile-controls {
            display: none; /* Caché par défaut, activé via JS si tactile */
            position: absolute; bottom: 20px; width: 100%;
            justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            pointer-events: none; /* Pour ne pas bloquer le clic sur le canvas */
        }
        .d-pad { display: grid; grid-template-columns: 50px 50px 50px; pointer-events: auto; }
        .m-btn {
            width: 50px; height: 50px; background: rgba(255,255,255,0.2); 
            border: 2px solid white; color: white; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .action-btn {
            width: 80px; height: 80px; border-radius: 40px; background: rgba(255, 235, 59, 0.3);
            pointer-events: auto; font-weight: bold;
        }

        /* --- FIN --- */
        #ending-screen {
            display: none; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 400px; background-color: black; border: 3px solid white;
            flex-direction: column; text-align: center; z-index: 100;
        }
        #ending-text { color: white; font-family: 'Times New Roman', serif; font-size: 20px; padding: 20px; }

        /* --- LISTE --- */
        #ends-list-container {
            display: none; width: 90%; height: 90%; background-color: #1a1a1a;
            border: 5px solid black; padding: 20px; overflow-y: auto; box-sizing: border-box;
        }

        @media (max-width: 600px) {
            #menu { flex-direction: column; }
            #menu-left, #menu-right { width: 100%; height: 50%; }
            .mobile-controls { display: flex; }
        }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div id="menu">
            <div id="menu-left">
                <h1>Je suis chez moi et je doit avoir<br><span>100 FIN.</span></h1>
                <button class="btn" onclick="startGame()">JOUER</button>
                <button class="btn" onclick="showEndsList()">LES FINS (<span id="ends-count">0</span>/100)</button>
            </div>
            <div id="menu-right">
                <canvas id="previewCanvas" width="160" height="120" style="width:100%; height:100%;"></canvas>
            </div>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas" width="160" height="120"></canvas>
            
            <div class="mobile-controls" id="touchUI">
                <div class="d-pad">
                    <div></div><div class="m-btn" ontouchstart="handleTouch('Up', true)" ontouchend="handleTouch('Up', false)">↑</div><div></div>
                    <div class="m-btn" ontouchstart="handleTouch('Left', true)" ontouchend="handleTouch('Left', false)">←</div><div></div><div class="m-btn" ontouchstart="handleTouch('Right', true)" ontouchend="handleTouch('Right', false)">→</div>
                    <div></div><div class="m-btn" ontouchstart="handleTouch('Down', true)" ontouchend="handleTouch('Down', false)">↓</div><div></div>
                </div>
                <div class="m-btn action-btn" onclick="checkInteraction()">ACTION</div>
            </div>

            <div id="ending-screen">
                <p id="ending-text">Nom de la fin</p>
                <button class="btn" onclick="returnToMenu()">Retour au menu</button>
            </div>
        </div>

        <div id="ends-list-container">
            <h2>Fins débloquées</h2>
            <ul id="ends-ul"></ul>
            <button class="btn" onclick="returnToMenuFromList()">Retour</button>
        </div>
    </div>

    <script>
        let unlockedEnds = JSON.parse(localStorage.getItem('100fins_sauvegarde')) || [];
        document.getElementById('ends-count').innerText = unlockedEnds.length;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        
        let gameState = 'MENU';
        let keys = {};
        let player = { x: 80, y: 60, size: 8, color: '#4CAF50', speed: 1.5 };

        const objects = [
            { id: 'tv', x: 20, y: 10, w: 30, h: 10, color: '#111', interact: () => unlockEnd(1, "Téléphage", "Tu as regardé la télé jusqu'à ce que tes yeux fondent.") },
            { id: 'canape', x: 20, y: 40, w: 30, h: 15, color: '#8B0000', interact: () => unlockEnd(2, "Grosse Sieste", "Tu t'es endormi sur le canapé et tu n'as jamais voulu te réveiller.") },
            { id: 'porte', x: 140, y: 50, w: 10, h: 20, color: '#5C4033', interact: () => unlockEnd(3, "L'Extérieur ?", "Tu as essayé de sortir... mais le monde extérieur fait trop peur.") }
        ];

        // --- GESTION TACTILE ---
        function handleTouch(dir, isPressed) {
            keys['Arrow' + dir] = isPressed;
        }

        // --- CLAVIER ---
        window.addEventListener('keydown', e => { keys[e.code] = true; });
        window.addEventListener('keyup', e => { 
            keys[e.code] = false; 
            if(e.code === 'Space' && gameState === 'PLAYING') checkInteraction();
        });

        function unlockEnd(id, name, description) {
            if (!unlockedEnds.some(e => e.id === id)) {
                unlockedEnds.push({ id, name, description });
                localStorage.setItem('100fins_sauvegarde', JSON.stringify(unlockedEnds));
                document.getElementById('ends-count').innerText = unlockedEnds.length;
            }
            document.getElementById('ending-text').innerHTML = `<strong>Fin #${id} : ${name}</strong><br><br>${description}`;
            document.getElementById('ending-screen').style.display = 'flex';
            gameState = 'ENDED';
        }

        function checkInteraction() {
            if (gameState !== 'PLAYING') return;
            const pCenter = { x: player.x + player.size/2, y: player.y + player.size/2 };
            for(let obj of objects) {
                if (pCenter.x > obj.x - 12 && pCenter.x < obj.x + obj.w + 12 &&
                    pCenter.y > obj.y - 12 && pCenter.y < obj.y + obj.h + 12) {
                    obj.interact();
                    break;
                }
            }
        }

        function update() {
            if (gameState !== 'PLAYING') return;
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

            // Limites des murs
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
        }

        function draw(context) {
            context.fillStyle = '#8B5A2B';
            context.fillRect(0,0, canvas.width, canvas.height);
            for(let obj of objects) {
                context.fillStyle = obj.color;
                context.fillRect(obj.x, obj.y, obj.w, obj.h);
            }
            context.fillStyle = player.color;
            context.fillRect(player.x, player.y, player.size, player.size);
        }

        function loop() {
            update();
            if (gameState === 'PLAYING') draw(ctx);
            else if (gameState === 'MENU') draw(previewCtx);
            requestAnimationFrame(loop);
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            gameState = 'PLAYING';
        }

        function returnToMenu() {
            document.getElementById('ending-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            gameState = 'MENU';
        }

        function showEndsList() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ends-list-container').style.display = 'block';
            const ul = document.getElementById('ends-ul');
            ul.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                let li = document.createElement('li');
                let found = unlockedEnds.find(e => e.id === i);
                li.innerHTML = found ? `<strong style="color:#4CAF50">#${i} ${found.name}</strong>` : `<span style="color:#555">#${i} ???</span>`;
                ul.appendChild(li);
            }
        }

        function returnToMenuFromList() {
            document.getElementById('ends-list-container').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }

        // Détection tactile pour afficher l'UI mobile
        if ('ontouchstart' in window) {
            document.getElementById('touchUI').style.display = 'flex';
        }

        loop();
    </script>
</body>
</html>
